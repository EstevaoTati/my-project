# Netlify configuration — MWINDA GROUP LLC
# Static site, no build step required.

[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "20"

# Pretty URL: serve preview.html-style content from the homepage if you ever
# want it; default is index.html. Kept here as a reference, commented out.
# [[redirects]]
#   from = "/preview"
#   to = "/preview.html"
#   status = 200

# 404 fallback (optional; the site is single-page anchors so usually unused)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ----- Security & performance headers -----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Allow CDN scripts (Three.js, GSAP) and Google Fonts
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
